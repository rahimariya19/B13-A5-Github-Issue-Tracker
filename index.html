<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- tailwind+daisyui -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
     <!-- google font -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
      <!-- icon -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

     <style>
        *{
            font-family: "Inter", sans-serif;
        }

        .tab-btn {
            padding: 6px 14px;
            border-radius: 6px;
            background: #eee;
            font-size: 14px;
        }
        .tab-btn.active {
            background: linear-gradient(to right, #6d28d9, #4f46e5);
            color: white;
        }
     </style>

</head>


<!--  Login section  -->

<body class="bg-gray-200 min-h-screen flex items-center justify-center">

    <div id="loginPage" class="h-screen flex items-center justify-center ">
        <div class="bg-white p-8 grid justify-center rounded-xl  w-80">
            <img class=" ml-12 mb-5" src="./assets/github-logo.png" alt="">
            <h1 class="text-xl font-semibold text-[#2A3341] text-center mb-2">GitHub Issues Tracker</h1>
            <p class="text-center text-[#748297] text-sm mb-5">Sign to manage your issues</p>
            
            <form action="">
                <div>
                    <label class="text-[#2F3845] m text-sm font-medium">Username</label>
                    <input id="username" type="text" placeholder="Username" class="input input-bordered w-full mb-2 mt-2"/>
                    <p class="text-xs text-[#6425FF] ">Default: admin</p>
                </div>
                
                <div>
                    <label class="text-[#2F3845] text-sm font-medium">Password</label>
                    <input id="password" type="password" placeholder="Password" class="input input-bordered w-full mb-2 mt-2"/> <p class="text-xs text-[#6425FF] mb-4">Default: admin123</p>
                </div>
                
                <button onclick="login()" class="btn w-full bg-[#6425FF] text-white border-none">Sign In</button>
            </form>

            <div class="divider text-sm">OR</div>
            <div class="border border-gray-300 rounded-md p-4 text-center text-sm">
                <p class="text-gray-500 mb-1">Demo Credentials:</p>
                <p>Username: <b>admin</b></p>
                <p>Password: <b>admin123</b></p>
            </div>
        </div>
    </div>

    <!-- main page section  -->
     <div id="mainPage" class="hidden">
        
        <!-- navber section -->
         <div class="flex justify-between items-center bg-white px-6 py-3 shadow">
            <h1 class="font-bold text-lg">GitHub Issues Tracker</h1>
            <div class="flex gap-2">
                <input id="searchInput" placeholder="Search issues..."class="input input-bordered"/>
                <button onclick="searchIssues()" class="btn btn-primary">Search</button>
            </div>
        </div>
        
        <div class="p-6">
            <!-- top -->
             <div class="bg-white p-4 rounded-lg shadow mb-5">
                <!-- tabs + right info -->
                 <div class="flex justify-between items-center">
                    <!-- left -->
                     <div class="flex gap-2">
                        <button class="tab-btn active" onclick="filterIssues('all', event)">All</button>
                        <button class="tab-btn" onclick="filterIssues('open', event)">Open</button>
                        <button class="tab-btn" onclick="filterIssues('closed', event)">Closed</button>
                    </div>
                    
                    <!-- right -->
                     <div class="text-sm flex gap-4">
                        <span class="flex items-center gap-1">
                            <span class="w-2 h-2 bg-green-500 rounded-full"></span>Open</span>
                            <span class="flex items-center gap-1">
                                <span class="w-2 h-2 bg-purple-500 rounded-full"></span>Closed</span>
                            </div>
                        </div>
                        
                        <!-- Number -->
                         <h2 class="mt-3 font-semibold"><span id="issueCount">0</span> Issues</h2>
                    </div>
                    
                    <!-- louder -->
                     <div id="loader" class="hidden flex justify-center mb-4"><span class="loading loading-spinner loading-md"></span>
                    </div>
                    <!-- all cards -->
                     <div id="issuesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5"></div>
                </div>
           </div>
           
           <!-- modal -->
            
           <dialog id="issueModal" class="modal">
            <div class="modal-box">
                <h3 id="modalTitle" class="font-bold text-lg"></h3>
                <p id="modalDesc" class="py-2"></p>
                <p>Status: <span id="modalStatus"></span></p>
                <p>Author: <span id="modalAuthor"></span></p>
                <p>Priority: <span id="modalPriority"></span></p>
                <p>Label: <span id="modalLabel"></span></p>
                <p>Date: <span id="modalDate"></span></p>
                <div class="modal-action">
                    <form method="dialog">
                        <button class="btn">Close</button>
                    </form>
                </div>
            </div>
        </dialog>
        
        
        
        
        
        <script src="./script.js"></script>


</body>
</html>
