<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- tailwind+daisyui -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
     <!-- google font -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
      <!-- icon -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

     <style>
        *{
            font-family: "Inter", sans-serif;
        }
     </style>

</head>
<body class="bg-gray-200 min-h-screen flex items-center justify-center">

    <div id="loginPage" class="h-screen flex items-center justify-center ">
        <div class="bg-white p-8 grid justify-center rounded-xl  w-80">
            <img class=" ml-12 mb-5" src="./assets/github-logo.png" alt="">
            <h1 class="text-xl font-semibold text-center mb-2">GitHub Issues Tracker</h1>
            <p class="text-center text-gray-400 text-sm mb-5">Sign to manage your issues</p>
            
            <form action="">
                <div>
                    <label class="text-sm font-medium">Username</label>
                    <input id="username" type="text" placeholder="Username" class="input input-bordered w-full mb-2"/>
                    <p class="text-xs text-blue-500 ">Default: admin</p>
                </div>
                
                <div>
                    <label class="text-sm font-medium">Password</label>
                    <input id="password" type="password" placeholder="Password" class="input input-bordered w-full mb-2"/> <p class="text-xs text-blue-500 mb-4">Default: admin123</p>
                </div>
                
                <button onclick="login()" class="btn w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white border-none">Sign In</button>
            </form>

            <div class="divider text-sm">OR</div>
            <div class="border border-gray-300 rounded-md p-4 text-center text-sm">
                <p class="text-gray-500 mb-1">Demo Credentials:</p>
                <p>Username: <b>admin</b></p>
                <p>Password: <b>admin123</b></p>
            </div>
        </div>
    </div>



  <script src="./script.js"></script>


</body>
</html>
